# nginx/nginx.prod.conf — Producción con HTTPS + Let's Encrypt
# Requisito previo: haber obtenido el certificado con:
#   certbot certonly --webroot -w /var/www/certbot -d tudominio.com

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  server_tokens   off;

  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1000;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    application/rss+xml image/svg+xml;

  client_max_body_size 20m;

  upstream frontend_upstream {
    server frontend:80;
  }

  upstream backend_upstream {
    server backend:3000;
  }

  # ── HTTP → redirige todo a HTTPS ─────────────────────────────────────────
  server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # Ruta para renovación de certificados Certbot
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name tudominio.com www.tudominio.com;

    # ── Certificados Let's Encrypt ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tudominio.com/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API → backend ────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── Uploads del backend ──────────────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://backend_upstream;
      proxy_set_header Host $host;
      expires          30d;
      add_header       Cache-Control "public, immutable";
    }

    # ── SPA Frontend ─────────────────────────────────────────────────────
    location / {
      proxy_pass          http://frontend_upstream;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_buffering     on;
      proxy_buffers       8 32k;
      proxy_busy_buffers_size 64k;
    }
  }
}
