# nginx/nginx.prod.conf — Producción con HTTPS + Let's Encrypt
# Requisito previo: obtener certificado con:
#   scripts/init-letsencrypt.sh   (primera vez)
# Luego el servicio certbot del compose renueva automáticamente.
#
# Reemplaza `tudominio.com` por tu dominio real antes de lanzar producción.

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Rendimiento ───────────────────────────────────────────────────────────
  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  server_tokens     off;

  # ── Compresión ────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1000;
  gzip_disable      "msie6";
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    application/rss+xml image/svg+xml font/woff2;

  client_max_body_size 20m;

  # ── Rate limiting (zona compartida) ───────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api_zone:10m  rate=30r/s;
  limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=5r/s;

  # ── DNS resolver para OCSP stapling ───────────────────────────────────────
  resolver          1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout  5s;

  upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
  }

  upstream backend_upstream {
    server backend:3000;
    keepalive 32;
  }

  # ── HTTP → redirige a HTTPS (excepto ACME challenge) ──────────────────────
  server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Healthcheck plano (para compose healthcheck y LB)
    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name tudominio.com www.tudominio.com;

    # ── Certificados Let's Encrypt ────────────────────────────────────────
    ssl_certificate         /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tudominio.com/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Healthcheck sin TLS verification overhead
    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── Auth (login/register) — rate limit más estricto ───────────────────
    location /api/auth/ {
      limit_req zone=auth_zone burst=10 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── API → backend ─────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_zone burst=50 nodelay;
      proxy_pass         http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── Uploads del backend ───────────────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://backend_upstream;
      proxy_set_header Host $host;
      expires          30d;
      add_header       Cache-Control "public, immutable";
    }

    # ── Assets hasheados del frontend (cache largo) ───────────────────────
    location /assets/ {
      proxy_pass          http://frontend_upstream;
      proxy_set_header    Host $host;
      expires             1y;
      add_header          Cache-Control "public, immutable";
      access_log          off;
    }

    # ── Sitemap y robots (cache moderado) ─────────────────────────────────
    location ~ ^/(sitemap\.xml|robots\.txt)$ {
      proxy_pass       http://backend_upstream;
      proxy_set_header Host $host;
      expires          1h;
      add_header       Cache-Control "public";
    }

    # ── SPA Frontend ──────────────────────────────────────────────────────
    location / {
      proxy_pass          http://frontend_upstream;
      proxy_http_version  1.1;
      proxy_set_header    Connection        "";
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto https;
      proxy_buffering     on;
      proxy_buffers       8 32k;
      proxy_busy_buffers_size 64k;
    }
  }
}
